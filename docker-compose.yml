version: "3.9"

# ── Zimbabwe Property Market Intelligence Platform ─────────────────────────────
# Orchestrated with Dagster.
#
# Services:
#   dagster-webserver  — Dagster UI at http://localhost:3000
#   dagster-daemon     — Runs schedules, sensors, and backfills
#   dagster-db         — PostgreSQL: Dagster run/event storage
#
# Quick start:
#   docker compose up                        # start all services
#   open http://localhost:3000               # Dagster UI
#
# Run full pipeline now (ad-hoc):
#   docker compose exec dagster-daemon \
#     dagster asset materialize --select "*" -f orchestration/pipeline.py
#
# Run scraper standalone (no Dagster):
#   docker compose run --rm scraper
# ──────────────────────────────────────────────────────────────────────────────

x-snowflake-env: &snowflake-env
  SNOWFLAKE_ACCOUNT:    ${SNOWFLAKE_ACCOUNT}
  SNOWFLAKE_USER:       ${SNOWFLAKE_USER}
  SNOWFLAKE_PASSWORD:   ${SNOWFLAKE_PASSWORD}
  SNOWFLAKE_DATABASE:   ${SNOWFLAKE_DATABASE:-ZIM_PROPERTY_DB}
  SNOWFLAKE_WAREHOUSE:  ${SNOWFLAKE_WAREHOUSE:-ZIM_PROPERTY_WH}
  SNOWFLAKE_ROLE:       ${SNOWFLAKE_ROLE:-ZIM_DBT_ROLE}
  SNOWFLAKE_RAW_SCHEMA: ${SNOWFLAKE_RAW_SCHEMA:-RAW}
  SNOWFLAKE_BATCH_SIZE: ${SNOWFLAKE_BATCH_SIZE:-500}

x-dagster-env: &dagster-env
  DAGSTER_HOME:                 /opt/dagster/dagster_home
  DAGSTER_POSTGRES_HOST:        dagster-db
  DAGSTER_POSTGRES_PORT:        "5432"
  DAGSTER_POSTGRES_DB:          dagster
  DAGSTER_POSTGRES_USER:        dagster
  DAGSTER_POSTGRES_PASSWORD:    ${DAGSTER_POSTGRES_PASSWORD:-dagster_password}
  SLACK_WEBHOOK_URL:            ${SLACK_WEBHOOK_URL:-}
  LOG_LEVEL:                    ${LOG_LEVEL:-INFO}
  DBT_TARGET:                   ${DBT_TARGET:-prod}

services:

  # ── PostgreSQL — Dagster metadata store ─────────────────────────────────────
  dagster-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       dagster
      POSTGRES_USER:     dagster
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-dagster_password}
    volumes:
      - dagster_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Dagster Webserver (UI) ───────────────────────────────────────────────────
  dagster-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    command: >
      dagster-webserver
        --host 0.0.0.0
        --port 3000
        --workspace /app/orchestration/workspace.yaml
    ports:
      - "3000:3000"
    environment:
      <<: [*snowflake-env, *dagster-env]
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./data:/app/data
      - ./logs:/app/logs
      - ./dbt/zim_property/target:/app/dbt/zim_property/target
    env_file:
      - configs/.env
    depends_on:
      dagster-db:
        condition: service_healthy
    restart: unless-stopped

  # ── Dagster Daemon — schedules, sensors, backfills ──────────────────────────
  dagster-daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    command: dagster-daemon run --workspace /app/orchestration/workspace.yaml
    environment:
      <<: [*snowflake-env, *dagster-env]
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./data:/app/data
      - ./logs:/app/logs
      - ./dbt/zim_property/target:/app/dbt/zim_property/target
    env_file:
      - configs/.env
    depends_on:
      dagster-db:
        condition: service_healthy
    restart: unless-stopped

  # ── Scraper (standalone, run-and-exit) ──────────────────────────────────────
  # Use: docker compose run --rm scraper
  # Dagster calls the scraper via subprocess — this service is for manual runs.
  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    environment:
      <<: *snowflake-env
      LOG_LEVEL:        ${LOG_LEVEL:-INFO}
      SCRAPY_HTTPCACHE: ${SCRAPY_HTTPCACHE:-false}
      PROXY_LIST:       ${PROXY_LIST:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - configs/.env
    restart: "no"

volumes:
  dagster_postgres_data:
  dagster_home:
  data:
  logs:
